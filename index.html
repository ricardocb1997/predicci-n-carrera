<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Estimador de tiempo en trail</title>

<style>
:root{
  --bg:#f5f7fa;
  --card:#ffffff;
  --text:#1f2933;
  --muted:#6b7280;
  --border:#e5e7eb;
  --soft:#f9fafb;
}

body{margin:0;background:var(--bg);font-family:system-ui;color:var(--text);}
.wrap{max-width:1200px;margin:20px auto;padding:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:900px){.grid{grid-template-columns:1fr;}}

.block{background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:12px;}

input,select{
  width:100%;
  padding:8px;
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:8px;
}

.result{
  background:#eef2f7;
  border:1px dashed #cbd5e1;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
  font-weight:600;
}

button{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  cursor:pointer;
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<h2>Estimador de tiempo en trail</h2>

<div class="grid">

<!-- REF 1 -->
<div class="block">
<h3>Referencia 1</h3>
<input id="r1d" placeholder="Distancia km">
<input id="r1e" placeholder="Desnivel +">
<input id="r1t" placeholder="Tiempo (min)">

<select id="r1tech">
<option value="low">Baja</option>
<option value="medium">Media</option>
<option value="high">Alta</option>
<option value="very_high">Muy alta</option>
</select>

<select id="r1alt">
<option value="low">0–1000 m</option>
<option value="mid">1000–2000 m</option>
<option value="high">2000–3000 m</option>
</select>

<select id="r1heat">
<option value="low">Poco</option>
<option value="medium">Medio</option>
<option value="high">Alto</option>
</select>
</div>

<!-- REF 2 -->
<div class="block">
<h3>Referencia 2</h3>
<input id="r2d" placeholder="Distancia km">
<input id="r2e" placeholder="Desnivel +">
<input id="r2t" placeholder="Tiempo (min)">

<select id="r2tech">
<option value="low">Baja</option>
<option value="medium">Media</option>
<option value="high">Alta</option>
<option value="very_high">Muy alta</option>
</select>

<select id="r2alt">
<option value="low">0–1000 m</option>
<option value="mid">1000–2000 m</option>
<option value="high">2000–3000 m</option>
</select>

<select id="r2heat">
<option value="low">Poco</option>
<option value="medium">Medio</option>
<option value="high">Alto</option>
</select>

<select id="profile">
<option value="balanced">Equilibrado</option>
<option value="speed">Explosivo</option>
<option value="ultra">Resistente</option>
</select>
</div>

<!-- TARGET -->
<div class="block">
<h3>Carrera objetivo</h3>

<input id="td" placeholder="Distancia km">
<input id="te" placeholder="Desnivel +">

<select id="ttech">
<option value="low">Baja</option>
<option value="medium">Media</option>
<option value="high">Alta</option>
<option value="very_high">Muy alta</option>
</select>

<select id="talt">
<option value="low">0–1000 m</option>
<option value="mid">1000–2000 m</option>
<option value="high">2000–3000 m</option>
</select>

<select id="theat">
<option value="low">Poco</option>
<option value="medium">Medio</option>
<option value="high">Alto</option>
</select>

<div class="result" id="result">—</div>
<div id="range"></div>

<button onclick="calc()">Estimar tiempo</button>
</div>

</div>
</div>
</div>

<script>

const TECH = {low:1, medium:1.08, high:1.18, very_high:1.30};
const ALT = {low:1, mid:1.04, high:1.09};
const HEAT = {low:1, medium:1.04, high:1.09};

function effort(d,e){return d + e/100;}

function profileFactors(p){
  if(p==="speed") return {long:1.12, ultra:1.1};
  if(p==="ultra") return {long:0.92, ultra:0.9};
  return {long:1, ultra:1};
}

function ultraMultiplier(d,e,p){
  const pf=profileFactors(p);
  let m=1;

  if(d>60) m+= (d-60)*0.0005*pf.long;
  if(d>100) m+= (d-100)*0.001*pf.long;
  if(d>140) m+= (d-140)*0.0015*pf.ultra;

  if(e>160) m+= Math.min((e-160)*0.0005,0.1);
  if(e>220) m+= Math.min((e-220)*0.00045,0.08);

  return m;
}

function extrapolation(ref,tar,p){
  const pf=profileFactors(p);
  const dr=tar.d/ref.d;
  const er=tar.eff/ref.eff;

  let pen=1;

  if(dr>1) pen*=Math.pow(dr,0.028*pf.long);
  if(dr>1.8) pen*=Math.pow(dr/1.8,0.04*pf.long);
  if(dr>2.6) pen*=Math.pow(dr/2.6,0.055*pf.ultra);

  if(er>1.2) pen*=Math.pow(er,0.018*pf.long);

  return pen;
}

function buildRace(d,e,t,tech,alt,heat,p){
  const eff=effort(d,e);
  const cond=TECH[tech]*ALT[alt]*HEAT[heat];
  const ultra=ultraMultiplier(d,eff,p);

  return {
    d,e,t,
    eff,
    cond,
    ultra,
    idx: t/(eff*cond*ultra)
  };
}

function similarity(r,t){
  const dg=Math.abs(Math.log(t.d/r.d));
  const eg=Math.abs(Math.log(t.eff/r.eff));
  return 1/(0.2 + dg*0.55 + eg*0.45);
}

function calc(){

  const p=profile.value;

  const r1=buildRace(+r1d.value,+r1e.value,+r1t.value,r1tech.value,r1alt.value,r1heat.value,p);

  const tRace={
    d:+td.value,
    e:+te.value
  };

  tRace.eff=effort(tRace.d,tRace.e);

  const tCond=TECH[ttech.value]*ALT[talt.value]*HEAT[theat.value];
  const tUltra=ultraMultiplier(tRace.d,tRace.eff,p);

  let refs=[r1];

  if(r2d.value){
    const r2=buildRace(+r2d.value,+r2e.value,+r2t.value,r2tech.value,r2alt.value,r2heat.value,p);
    refs.push(r2);
  }

  let idx;

  if(refs.length===1){
    idx = refs[0].idx * extrapolation(refs[0],tRace,p);
  }else{
    const w = refs.map(r=>similarity(r,tRace));
    const sum = w.reduce((a,b)=>a+b,0);

    idx = refs.reduce((acc,r,i)=>{
      const adj = r.idx * extrapolation(r,tRace,p);
      return acc + adj*(w[i]/sum);
    },0);
  }

  const time = idx * tRace.eff * tCond * tUltra;

  const low = time*0.98;
  const high = time*1.02;

  result.innerHTML = Math.round(time) + " min";
  range.innerHTML = "Rango: " + Math.round(low) + " – " + Math.round(high) + " min";
}

</script>
</body>
</html>
