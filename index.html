<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Estimador de tiempo en trail</title>

<style>
:root{
  --bg:#f5f7fa;
  --card:#ffffff;
  --text:#1f2933;
  --muted:#6b7280;
  --border:#e5e7eb;
  --soft:#f9fafb;
  --highlight:#dbeafe;
  --success:#dcfce7;
}

body{
  margin:0;
  background:var(--bg);
  font-family:system-ui;
  color:var(--text);
}

.wrap{
  max-width:1200px;
  margin:20px auto;
  padding:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}

.block{
  background:var(--soft);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

input,select{
  width:100%;
  padding:8px;
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:8px;
}

.result{
  background:#eef2f7;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-weight:600;
}

button{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  cursor:pointer;
}

</style>
</head>

<body>
<div class="wrap">
<div class="card">

<h2>Estimador de tiempo trail</h2>

<div class="grid">

<!-- REF 1 -->
<div class="block">
<h3>Referencia 1</h3>
<input id="r1d" placeholder="Distancia km">
<input id="r1e" placeholder="Desnivel +">
<input id="r1t" placeholder="Tiempo (min)">
<select id="r1tech">
<option value="1">Baja</option>
<option value="1.08">Media</option>
<option value="1.18">Alta</option>
<option value="1.30">Muy alta</option>
</select>
</div>

<!-- REF 2 -->
<div class="block">
<h3>Referencia 2</h3>
<input id="r2d" placeholder="Distancia km">
<input id="r2e" placeholder="Desnivel +">
<input id="r2t" placeholder="Tiempo (min)">
<select id="r2tech">
<option value="1">Baja</option>
<option value="1.08">Media</option>
<option value="1.18">Alta</option>
<option value="1.30">Muy alta</option>
</select>

<select id="profile">
<option value="1">Equilibrado</option>
<option value="1.1">Explosivo</option>
<option value="0.9">Resistente</option>
</select>
</div>

<!-- TARGET -->
<div class="block">
<h3>Objetivo</h3>
<input id="td" placeholder="Distancia km">
<input id="te" placeholder="Desnivel +">
<select id="ttech">
<option value="1">Baja</option>
<option value="1.08">Media</option>
<option value="1.18">Alta</option>
<option value="1.30">Muy alta</option>
</select>

<div class="result" id="result">—</div>
<div id="range"></div>

<button onclick="calc()">Estimar tiempo</button>
</div>

</div>
</div>
</div>

<script>

function effort(d,e){
  return d + e/100;
}

function extrapolation(ratio, profile){
  let p=1;
  if(ratio>1){
    p*=Math.pow(ratio,0.028*profile);
  }
  if(ratio>1.8){
    p*=Math.pow(ratio/1.8,0.04*profile);
  }
  if(ratio>2.6){
    p*=Math.pow(ratio/2.6,0.055*profile);
  }
  return p;
}

function index(d,e,t,tech,profile,targetD){
  const eff=effort(d,e);
  const base=t/(eff*tech);
  const ratio=targetD/d;
  return base*extrapolation(ratio,profile);
}

function calc(){

  const r1d=+r1d.value;
  const r1e=+r1e.value;
  const r1t=+r1t.value;
  const r1tech=+r1tech.value;

  const r2d=+r2d.value;
  const r2e=+r2e.value;
  const r2t=+r2t.value;
  const r2tech=+r2tech.value;

  const td=+td.value;
  const te=+te.value;
  const ttech=+ttech.value;
  const profile=+profile.value;

  const teff=effort(td,te);

  let idx;

  if(r2d){
    const i1=index(r1d,r1e,r1t,r1tech,profile,td);
    const i2=index(r2d,r2e,r2t,r2tech,profile,td);

    const w1=1/Math.abs(td-r1d);
    const w2=1/Math.abs(td-r2d);

    idx=(i1*w1+i2*w2)/(w1+w2);
  }else{
    idx=index(r1d,r1e,r1t,r1tech,profile,td);
  }

  const time=idx*teff*ttech;

  const low=time*0.98;
  const high=time*1.02;

  result.innerHTML=Math.round(time)+" min";
  range.innerHTML="Rango: "+Math.round(low)+" - "+Math.round(high)+" min";
}

</script>

</body>
</html>
